<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taaja Bazaar — Groceries delivered fresh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4EFE3;
  --surface:#FFFFFF;
  --night:#152238;
  --night-soft:#22345279;
  --ink:#1E2A38;
  --ink-soft:#5C6675;
  --marigold:#E8890C;
  --marigold-dark:#BE6E04;
  --brick:#A6382B;
  --brick-soft:#F6E2DE;
  --teal:#0E6E5C;
  --teal-soft:#DDEDE7;
  --line:#E1D9C4;
  --radius:8px;
  --shadow:0 1px 0 rgba(21,34,56,0.04), 0 10px 24px rgba(21,34,56,0.07);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.display{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-0.01em;margin:0;color:var(--night);}
.mono{font-family:'Space Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}
:focus-visible{outline:3px solid var(--marigold-dark);outline-offset:2px;}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px;}
#app{min-height:100vh;display:flex;flex-direction:column;}
main{flex:1;}

/* ---------- header ---------- */
.topbar{background:var(--night);color:#CBD3DE;font-size:12.5px;}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;padding:6px 0;flex-wrap:wrap;gap:6px;}
.topbar a{text-decoration:none;color:#CBD3DE;}
header.site{position:sticky;top:0;z-index:50;background:var(--night);color:#EFEAD8;border-bottom:3px solid var(--marigold);}
.nav-row{display:flex;align-items:center;gap:18px;padding:14px 0;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;flex-shrink:0;}
.brand-mark{width:40px;height:40px;border-radius:10px;background:var(--marigold);color:var(--night);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;flex-shrink:0;}
.brand-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;line-height:1;}
.brand-tag{font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;color:#93A0B3;margin-top:3px;}
.search-form{flex:1;min-width:180px;max-width:480px;display:flex;background:#1E314F;border-radius:999px;padding:4px 4px 4px 16px;align-items:center;gap:8px;}
.search-form input{flex:1;background:transparent;border:none;color:#fff;font-size:14px;padding:8px 0;}
.search-form input::placeholder{color:#8391A6;}
.search-form input:focus{outline:none;}
.search-form button{background:var(--marigold);color:var(--night);border:none;border-radius:999px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.search-form button:hover{background:#fff;}
nav.links{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
nav.links a{text-decoration:none;color:#C8D0DC;font-size:14px;font-weight:600;padding:4px 2px;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;}
nav.links a.active,nav.links a:hover{color:#fff;border-bottom-color:var(--marigold);}
.icon-btn-nav{position:relative;}
.badge-count{position:absolute;top:-8px;right:-12px;background:var(--brick);color:#fff;font-size:10.5px;min-width:17px;height:17px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;}
.cat-strip{background:#1B2E4A;border-top:1px solid #26395A;}
.cat-strip .wrap{display:flex;gap:22px;overflow-x:auto;padding:9px 28px;scrollbar-width:none;}
.cat-strip .wrap::-webkit-scrollbar{display:none;}
.cat-strip a{white-space:nowrap;font-size:13px;color:#AEB9C8;text-decoration:none;font-weight:500;}
.cat-strip a:hover{color:#fff;}

/* ---------- footer ---------- */
footer.site{background:var(--night);color:#9AA6B6;margin-top:64px;}
.footer-inner{padding:48px 0 24px;display:flex;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.footer-inner h3{color:#fff;font-size:17px;margin-bottom:10px;}
.footer-inner p{font-size:13.5px;line-height:1.6;max-width:300px;margin:0;}
.footer-cols{display:flex;gap:48px;flex-wrap:wrap;}
.footer-col a{display:block;color:#9AA6B6;text-decoration:none;font-size:13.5px;margin-bottom:8px;}
.footer-col a:hover{color:#fff;}
.footer-col h4{color:#fff;font-size:13px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;font-family:'Inter';font-weight:700;}
.footer-bottom{border-top:1px solid #26395A;padding:16px 0 26px;font-size:11.5px;color:#6C7A8F;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.pay-badges{display:flex;gap:8px;}
.pay-badges span{background:#22345279;padding:4px 10px;border-radius:5px;font-size:11px;font-family:'Space Mono',monospace;color:#C8D0DC;}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:8px;font-weight:700;font-size:14.5px;border:2px solid transparent;text-decoration:none;transition:transform .12s ease;justify-content:center;}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--marigold);color:var(--night);}
.btn-primary:hover{background:var(--marigold-dark);color:#fff;}
.btn-outline{border-color:var(--night);color:var(--night);background:transparent;}
.btn-outline:hover{background:var(--night);color:#fff;}
.btn-dark{background:var(--night);color:#fff;}
.btn-dark:hover{background:#0E1926;}
.btn-danger{background:var(--brick-soft);color:var(--brick);}
.btn-danger:hover{background:var(--brick);color:#fff;}
.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:999px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-block{width:100%;}

/* ---------- receipt / ledger signature ---------- */
.receipt{background:var(--surface);position:relative;padding:26px 26px 30px;box-shadow:var(--shadow);
  --tooth:14px;
  clip-path: polygon(0 var(--tooth),3% 0,6% var(--tooth),9% 0,12% var(--tooth),15% 0,18% var(--tooth),21% 0,24% var(--tooth),27% 0,30% var(--tooth),33% 0,36% var(--tooth),39% 0,42% var(--tooth),45% 0,48% var(--tooth),51% 0,54% var(--tooth),57% 0,60% var(--tooth),63% 0,66% var(--tooth),69% 0,72% var(--tooth),75% 0,78% var(--tooth),81% 0,84% var(--tooth),87% 0,90% var(--tooth),93% 0,96% var(--tooth),100% 0,100% 100%,96% calc(100% - var(--tooth)),93% 100%,90% calc(100% - var(--tooth)),87% 100%,84% calc(100% - var(--tooth)),81% 100%,78% calc(100% - var(--tooth)),75% 100%,72% calc(100% - var(--tooth)),69% 100%,66% calc(100% - var(--tooth)),63% 100%,60% calc(100% - var(--tooth)),57% 100%,54% calc(100% - var(--tooth)),51% 100%,48% calc(100% - var(--tooth)),45% 100%,42% calc(100% - var(--tooth)),39% 100%,36% calc(100% - var(--tooth)),33% 100%,30% calc(100% - var(--tooth)),27% 100%,24% calc(100% - var(--tooth)),21% 100%,18% calc(100% - var(--tooth)),15% 100%,12% calc(100% - var(--tooth)),9% 100%,6% calc(100% - var(--tooth)),3% 100%,0 calc(100% - var(--tooth)));
}
.receipt-head{text-align:center;border-bottom:1px dashed var(--line);padding-bottom:16px;margin-bottom:16px;}
.receipt-head .mono{font-size:11.5px;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;}
.receipt-line{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;color:var(--ink-soft);font-family:'Space Mono',monospace;}
.receipt-line.total{color:var(--ink);font-weight:700;font-size:16px;border-top:1px dashed var(--line);padding-top:12px;margin-top:4px;}
.receipt-divider{border-top:1px dashed var(--line);margin:14px 0;}

/* ---------- hero ---------- */
.hero{padding:0;position:relative;background:var(--night);color:#fff;overflow:hidden;}
.hero-inner{display:grid;grid-template-columns:1.05fr 0.95fr;gap:40px;align-items:center;padding:56px 0;}
.hero h1{font-size:clamp(32px,4.6vw,50px);line-height:1.08;color:#fff;}
.hero p.lede{font-size:16.5px;color:#C8D0DC;max-width:460px;margin-top:16px;line-height:1.6;}
.hero-actions{margin-top:26px;display:flex;gap:14px;flex-wrap:wrap;}
.eyebrow{font-family:'Space Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--brick);}
.eyebrow.on-dark{color:var(--marigold);}
.hero-dots{display:flex;gap:8px;margin-top:22px;}
.hero-dots button{all:unset;cursor:pointer;width:22px;height:4px;border-radius:2px;background:#3B4C68;}
.hero-dots button.active{background:var(--marigold);}
.hero-visual{position:relative;height:320px;}
.hero-card{position:absolute;background:var(--surface);color:var(--ink);border-radius:14px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,0.35);}
.hero-card.c1{top:0;left:20px;width:190px;}
.hero-card.c2{bottom:10px;right:0;width:210px;}
.hero-card .r{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--ink-soft);}
.hero-card .r b{color:var(--ink);font-family:'Space Mono',monospace;}

/* ---------- ticker ---------- */
.ticker-wrap{background:var(--surface);border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;}
.ticker{display:flex;white-space:nowrap;animation:scroll 34s linear infinite;padding:11px 0;}
.ticker span{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--ink-soft);padding:0 20px;border-right:1px solid var(--line);}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@media (prefers-reduced-motion:reduce){.ticker{animation:none;}}

/* ---------- category grid ---------- */
.cat-section{padding:52px 0 20px;}
.cat-heading{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:10px;}
.cat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
@media (max-width:980px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media (max-width:560px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
.cat-tile{all:unset;cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;font-size:12.5px;font-weight:600;color:var(--ink);transition:border-color .15s, transform .15s;}
.cat-tile svg{width:30px;height:30px;color:var(--teal);}
.cat-tile:hover{border-color:var(--marigold);transform:translateY(-2px);}

/* ---------- product grid / cards ---------- */
.section-title-row{display:flex;justify-content:space-between;align-items:baseline;margin:48px 0 20px;flex-wrap:wrap;gap:10px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
@media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.grid{grid-template-columns:1fr;}.hero-inner{grid-template-columns:1fr;padding:40px 0;}.hero-visual{height:220px;margin-top:10px;}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 10px 0;}
.card-tag{background:var(--teal-soft);color:var(--teal);font-family:'Space Mono',monospace;font-size:10.5px;padding:4px 9px;border-radius:5px;letter-spacing:0.02em;}
.card-tag.sale{background:var(--brick-soft);color:var(--brick);}
.wish-btn{all:unset;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);background:var(--bg);}
.wish-btn:hover{color:var(--brick);}
.wish-btn.active{color:var(--brick);}
.wish-btn svg{width:16px;height:16px;}
.card-icon{display:flex;align-items:center;justify-content:center;height:96px;cursor:pointer;}
.card-icon svg{width:58px;height:58px;}
.card-body{padding:0 16px 16px;display:flex;flex-direction:column;gap:5px;flex:1;}
.card-body h3{font-size:15.5px;cursor:pointer;}
.card-unit{font-size:12px;color:var(--ink-soft);}
.stars{color:var(--marigold);font-size:12px;letter-spacing:1px;}
.stars .count{color:var(--ink-soft);font-family:'Inter';margin-left:4px;}
.card-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;}
.price{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--night);}
.price-old{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);text-decoration:line-through;margin-right:6px;}
.add-btn{background:var(--night);color:#fff;border:none;border-radius:999px;padding:8px 14px;font-size:12.5px;font-weight:700;}
.add-btn:hover{background:var(--marigold);color:var(--night);}
.stock-low{color:var(--brick);font-size:11px;font-weight:700;}
.stepper{display:flex;align-items:center;gap:9px;background:var(--bg);border-radius:999px;padding:4px 6px;}
.stepper button{all:unset;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--night);color:#fff;font-weight:700;font-size:13px;}
.stepper button:hover{background:var(--marigold);color:var(--night);}
.stepper .qty{font-family:'Space Mono',monospace;font-weight:700;min-width:13px;text-align:center;font-size:13px;}

/* ---------- chips ---------- */
.chip-row{display:flex;gap:9px;flex-wrap:wrap;margin:24px 0 32px;}
.chip{border:1.5px solid var(--night);color:var(--night);background:transparent;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;}
.chip.active,.chip:hover{background:var(--night);color:#fff;}

/* ---------- page head ---------- */
.page-head{padding:40px 0 6px;}
.page-head .eyebrow{margin-bottom:8px;display:block;}
.page-head h1{font-size:clamp(26px,3.6vw,38px);}
.page-head p{color:var(--ink-soft);max-width:560px;margin-top:10px;font-size:15px;}

/* ---------- product details ---------- */
.pd-layout{display:grid;grid-template-columns:0.9fr 1.1fr;gap:40px;margin-top:10px;align-items:start;}
@media (max-width:860px){.pd-layout{grid-template-columns:1fr;}}
.pd-visual{background:var(--surface);border:1px solid var(--line);border-radius:14px;height:320px;display:flex;align-items:center;justify-content:center;}
.pd-visual svg{width:150px;height:150px;color:var(--teal);}
.pd-price-row{display:flex;align-items:baseline;gap:12px;margin:14px 0;}
.pd-price-row .price{font-size:26px;}
.qty-row{display:flex;align-items:center;gap:16px;margin:18px 0;}
.review-item{border-top:1px solid var(--line);padding:14px 0;}
.review-item .who{font-weight:700;font-size:13.5px;}
.review-item .when{font-size:11.5px;color:var(--ink-soft);margin-left:8px;}
.review-item p{margin:6px 0 0;font-size:14px;color:var(--ink-soft);}

/* ---------- cart / checkout ---------- */
.cart-layout,.checkout-layout{display:grid;grid-template-columns:1.6fr 1fr;gap:30px;align-items:start;margin-top:18px;}
@media (max-width:860px){.cart-layout,.checkout-layout{grid-template-columns:1fr;}}
.cart-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line);}
.cart-row .card-icon{height:auto;width:52px;flex-shrink:0;cursor:default;}
.cart-row .card-icon svg{width:40px;height:40px;color:var(--teal);}
.cart-row-name{flex:1;min-width:110px;}
.cart-row-name h3{font-size:15px;}
.remove-btn{all:unset;color:var(--brick);font-size:12.5px;cursor:pointer;margin-top:4px;}
.remove-btn:hover{text-decoration:underline;}
.cart-row .line-total{font-family:'Space Mono',monospace;font-weight:700;width:80px;text-align:right;}
.empty-state{text-align:center;padding:64px 20px;}
.empty-state svg{width:70px;height:70px;margin-bottom:16px;color:var(--line);}
.empty-state p{color:var(--ink-soft);margin:10px 0 20px;}
.coupon-row{display:flex;gap:8px;margin:14px 0;}
.coupon-row input{flex:1;}
.coupon-note{font-size:12px;color:var(--teal);margin-top:6px;}
.coupon-note.err{color:var(--brick);}

fieldset{border:none;padding:0;margin:0 0 26px;}
legend{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;color:var(--night);margin-bottom:13px;padding:0;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.field-row.single{grid-template-columns:1fr;}
@media (max-width:540px){.field-row{grid-template-columns:1fr;}}
label{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px;}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;background:var(--surface);color:var(--ink);}
textarea{resize:vertical;min-height:80px;}
input:focus,select:focus,textarea:focus{border-color:var(--marigold-dark);outline:none;}
.error-text{color:var(--brick);font-size:12px;margin-top:5px;display:none;}
.field-error input,.field-error select{border-color:var(--brick);}
.field-error .error-text{display:block;}
.pay-options{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:8px 0 20px;}
@media (max-width:540px){.pay-options{grid-template-columns:1fr;}}
.pay-opt{all:unset;cursor:pointer;border:2px solid var(--line);border-radius:10px;padding:18px;display:flex;align-items:center;gap:12px;background:var(--surface);}
.pay-opt.selected{border-color:var(--marigold-dark);background:#FFF7EB;}
.pay-opt .swatch{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Space Mono',monospace;font-weight:700;font-size:12px;flex-shrink:0;}
.pay-opt .swatch.esewa{background:#5FA829;}
.pay-opt .swatch.khalti{background:#5D2E8C;}
.pay-opt .meta{text-align:left;}
.pay-opt .meta strong{display:block;font-size:14.5px;}
.pay-opt .meta span{font-size:11.5px;color:var(--ink-soft);}

/* ---------- gateway simulation ---------- */
.gateway-screen{max-width:440px;margin:40px auto;background:var(--surface);border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;}
.gateway-head{padding:22px;color:#fff;text-align:center;}
.gateway-head.esewa{background:#5FA829;}
.gateway-head.khalti{background:#5D2E8C;}
.gateway-head .mono{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.85;}
.gateway-head h2{color:#fff;font-size:20px;margin-top:6px;}
.gateway-body{padding:26px;text-align:center;}
.gateway-body .amt{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;color:var(--night);margin:10px 0 18px;}
.gateway-spinner{width:38px;height:38px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--marigold-dark);margin:0 auto 16px;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.gateway-disclaimer{font-size:11.5px;color:var(--ink-soft);background:var(--bg);border-radius:8px;padding:10px 12px;margin-top:16px;}

/* ---------- confirmation ---------- */
.confirm{text-align:center;padding:56px 20px 20px;}
.confirm-badge{width:76px;height:76px;border-radius:50%;background:var(--teal-soft);color:var(--teal);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;}
.confirm-badge svg{width:38px;height:38px;}
.confirm h1{font-size:clamp(26px,3.6vw,34px);margin-bottom:10px;}
.confirm p{color:var(--ink-soft);font-size:15px;}

/* ---------- order tracking ---------- */
.track-stepper{display:flex;justify-content:space-between;margin:34px 0 10px;position:relative;}
.track-stepper::before{content:'';position:absolute;top:15px;left:5%;right:5%;height:2px;background:var(--line);z-index:0;}
.track-step{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;text-align:center;}
.track-step .dot{width:32px;height:32px;border-radius:50%;background:var(--surface);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.track-step.done .dot{background:var(--teal);border-color:var(--teal);color:#fff;}
.track-step.current .dot{background:var(--marigold);border-color:var(--marigold-dark);color:var(--night);}
.track-step span.label{font-size:11.5px;font-weight:600;color:var(--ink-soft);max-width:80px;}
.track-step.done span.label,.track-step.current span.label{color:var(--ink);}
.track-cancelled{background:var(--brick-soft);color:var(--brick);border-radius:10px;padding:16px 18px;font-weight:600;margin:24px 0;}

/* ---------- auth ---------- */
.auth-card{max-width:420px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow);}
.auth-toggle{display:flex;gap:8px;margin-bottom:22px;}
.auth-toggle button{flex:1;background:transparent;border:1.5px solid var(--night);color:var(--night);border-radius:999px;padding:9px;font-weight:700;font-size:13px;}
.auth-toggle button.active{background:var(--night);color:#fff;}
.auth-error{background:var(--brick-soft);color:var(--brick);font-size:13px;padding:10px 12px;border-radius:6px;margin-bottom:14px;}
.auth-note{background:var(--teal-soft);color:var(--teal);font-size:12px;padding:9px 12px;border-radius:6px;margin-bottom:14px;}

/* ---------- profile / wishlist / orders list ---------- */
.profile-grid{display:grid;grid-template-columns:220px 1fr;gap:30px;margin-top:20px;}
@media (max-width:760px){.profile-grid{grid-template-columns:1fr;}}
.profile-nav{display:flex;flex-direction:column;gap:4px;}
.profile-nav button{all:unset;cursor:pointer;padding:11px 14px;border-radius:8px;font-size:14px;font-weight:600;color:var(--ink-soft);}
.profile-nav button.active{background:var(--night);color:#fff;}
.profile-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);}

/* ---------- FAQ accordion ---------- */
.faq-item{border-bottom:1px solid var(--line);}
.faq-q{all:unset;cursor:pointer;width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 4px;font-weight:700;font-size:15px;color:var(--night);}
.faq-q .chev{transition:transform .2s;}
.faq-item.open .faq-q .chev{transform:rotate(45deg);}
.faq-a{padding:0 4px 18px;color:var(--ink-soft);font-size:14.5px;line-height:1.6;display:none;}
.faq-item.open .faq-a{display:block;}

/* ---------- admin ---------- */
.admin-shell{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 0px);}
@media (max-width:820px){.admin-shell{grid-template-columns:1fr;}}
.admin-side{background:var(--night);color:#C8D0DC;padding:22px 16px;}
.admin-side .brand{margin-bottom:26px;padding:0 6px;}
.admin-side nav{display:flex;flex-direction:column;gap:2px;}
.admin-side nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;color:#AEB9C8;font-size:13.5px;font-weight:600;}
.admin-side nav a.active,.admin-side nav a:hover{background:#22345279;color:#fff;}
.admin-side .logout-row{margin-top:20px;padding-top:16px;border-top:1px solid #26395A;}
.admin-main{padding:30px 32px;background:var(--bg);min-height:100vh;}
.admin-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px;}
@media (max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.stat-card .lbl{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;}
.stat-card .val{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--night);margin-top:6px;}
.stat-card .delta{font-size:12px;color:var(--teal);margin-top:4px;}
.admin-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.admin-table th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);background:var(--bg);padding:10px 12px;}
.admin-table td{padding:10px 12px;border-top:1px solid var(--line);font-size:13px;vertical-align:middle;}
.admin-table input,.admin-table select{padding:7px 9px;font-size:12.5px;}
.admin-actions{display:flex;gap:6px;flex-wrap:wrap;}
.icon-btn{all:unset;cursor:pointer;font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;}
.icon-btn.edit{background:var(--bg);color:var(--night);}
.icon-btn.save{background:var(--night);color:#fff;}
.icon-btn.delete{background:var(--brick-soft);color:var(--brick);}
.status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;display:inline-block;}
.status-pill.Pending{background:#FDEBD0;color:#9A6B00;}
.status-pill.Confirmed{background:#DDEDE7;color:var(--teal);}
.status-pill.Packed{background:#E4E9F5;color:#3A4E9C;}
.status-pill.Out-for-Delivery{background:#FDE7D2;color:var(--marigold-dark);}
.status-pill.Delivered{background:#DBEEDC;color:#1F7A34;}
.status-pill.Cancelled{background:var(--brick-soft);color:var(--brick);}
.add-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:22px;}
.add-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media (max-width:760px){.add-grid{grid-template-columns:1fr 1fr;}}
@media (max-width:520px){.add-grid{grid-template-columns:1fr;}.admin-table{display:block;overflow-x:auto;white-space:nowrap;}}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:160px;margin:20px 0;}
.bar-chart .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar-chart .bar{width:100%;background:var(--marigold);border-radius:5px 5px 0 0;}
.bar-chart .bar-lbl{font-size:10.5px;color:var(--ink-soft);}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;align-items:start;}
@media (max-width:900px){.two-col{grid-template-columns:1fr;}}
.banner-card{display:flex;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.banner-swatch{width:60px;height:44px;border-radius:6px;flex-shrink:0;}
.settings-form{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;max-width:640px;}
.save-toast{position:fixed;bottom:22px;right:22px;background:var(--night);color:#fff;padding:12px 18px;border-radius:8px;font-size:13.5px;box-shadow:var(--shadow);z-index:100;}
</style>
</head>

function icon(name){ return ICONS[name] || ICONS.jar; }
function starRow(rating){
  let out = '';
  for(let i=1;i<=5;i++){ out += `<span style="opacity:${i<=Math.round(rating)?1:0.25}">${icon('star')}</span>`; }
  return `<span class="stars" style="display:inline-flex;gap:1px;vertical-align:middle;">${out}</span>`;
}

/* ============ STORAGE ============ */
const KEYS = {
  products:'tb_products', categories:'tb_categories', users:'tb_users', session:'tb_session',
  adminSession:'tb_admin_session', cart:'tb_cart', wishlist:'tb_wishlist', orders:'tb_orders',
  reviews:'tb_reviews', coupons:'tb_coupons', banners:'tb_banners', settings:'tb_settings'
};
function load(key, fallback){ try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(e){ return fallback; } }
function save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ console.warn('storage failed', e); } }

const DEFAULT_SETTINGS = {
  siteName:'Taaja Bazaar', tagline:'Groceries delivered fresh, across the valley.',

const state = {
  route:'home', routeParam:null,
  filter:'All', searchQuery:'',
  products: load(KEYS.products, DEFAULT_PRODUCTS.map(p=>({...p}))),
  users: load(KEYS.users, []),
  currentUser: load(KEYS.session, null),
  isAdmin: load(KEYS.adminSession, false),
  cart: load(KEYS.cart, {}),
  wishlist: load(KEYS.wishlist, []),
  orders: load(KEYS.orders, []),
  reviews: load(KEYS.reviews, DEFAULT_REVIEWS.map(r=>({...r}))),
  coupons: load(KEYS.coupons, DEFAULT_COUPONS.map(c=>({...c}))),
  banners: load(KEYS.banners, DEFAULT_BANNERS.map(b=>({...b}))),
  settings: load(KEYS.settings, {...DEFAULT_SETTINGS}),
  authMode:'login', authError:'',
  adminError:'', editingId:null, editingEntity:null,
  heroSlide:0,
  appliedCoupon: null,
  pendingPaymentMethod:null,
  pendingCheckout:null,
  lastOrderId:null,
  toast:null
};

function money(n){ return state.settings.currency + ' ' + Number(n).toLocaleString('en-IN', {maximumFractionDigits:0}); }
function findProduct(id){ return state.products.find(p=>p.id===id); }
function cartCount(){ return Object.values(state.cart).reduce((a,b)=>a+b,0); }
function cartSubtotal(){ return Object.entries(state.cart).reduce((sum,[id,qty])=>{ const p=findProduct(id); return sum + (p? p.price*qty:0); },0); }
function couponDiscount(subtotal){
  if(!state.appliedCoupon) return 0;
  const c = state.appliedCoupon;
  if(subtotal < c.minOrder) return 0;
  return c.type==='percent' ? Math.round(subtotal * c.value/100) : Math.min(c.value, subtotal);
}
function orderNumber(){ return 'TB' + Math.floor(100000 + Math.random()*900000); }
function txnId(prefix){ return prefix + '-' + Date.now().toString().slice(-9); }
function showToast(msg){ state.toast = msg; render(); setTimeout(()=>{ state.toast=null; const t=document.querySelector('.save-toast'); if(t) t.remove(); }, 2400); }

function setQty(id, qty){
  if(qty<=0) delete state.cart[id]; else state.cart[id]=qty;
  save(KEYS.cart, state.cart); render();
}
function addToCart(id){ setQty(id, (state.cart[id]||0)+1); }
function toggleWishlist(id){
  const idx = state.wishlist.indexOf(id);
  if(idx>=0) state.wishlist.splice(idx,1); else state.wishlist.push(id);
  save(KEYS.wishlist, state.wishlist); render();
}

function navigate(route, param){
  state.route = route; state.routeParam = param;
  window.scrollTo({top:0, behavior:'auto'});
  render();
}

  const related = state.products.filter(r=>r.cat===p.cat && r.id!==p.id).slice(0,4);
  return `
  <section class="wrap" style="padding-top:30px;">
    <div class="pd-layout">

        <div class="pd-visual">${icon(p.icon)}</div>

          ${onSale? `<span class="price-old" style="font-size:16px;">${money(p.mrp)}</span>`:''}
          <span class="price">${money(p.price)}</span>
          <span class="card-unit">${p.unit}</span>
        </div>
        ${p.stock<=5 ? `<div class="stock-low">Only ${p.stock} left in stock</div>` : `<div class="mono" style="font-size:12px;color:var(--teal);">In stock — ${p.stock} available</div>`}
        <p style="color:var(--ink-soft);font-size:14.5px;line-height:1.6;margin-top:14px;">Sourced fresh for ${state.settings.siteName} and quality-checked before packing. Delivered same-day within Kathmandu Valley on orders placed before 4pm.</p>
        <div class="qty-row">
          <div class="stepper" style="background:var(--surface);border:1px solid var(--line);">
            <button data-dec="${p.id}" aria-label="Decrease">–</button><span class="qty">${qty||1}</span><button data-inc-safe="${p.id}" aria-label="Increase">+</button>
          </div>
          <button class="btn btn-primary" data-add="${p.id}">Add to basket</button>
          <button class="wish-btn ${wished?'active':''}" data-wish="${p.id}" style="width:42px;height:42px;background:var(--surface);border:1px solid var(--line);" aria-label="Toggle wishlist">${icon(wished?'heartFill':'heart')}</button>
        </div>
        <div class="receipt" style="--tooth:0;clip-path:none;padding:14px 16px;">
          <div class="receipt-line"><span>eSewa</span><span>Accepted</span></div>
          <div class="receipt-line"><span>Khalti</span><span>Accepted</span></div>
          <div class="receipt-line"><span>Free delivery over</span><span>${money(state.settings.freeShipThreshold)}</span></div>
        </div>
      </div>
    </div>

    <div class="section-title-row"><h2 style="font-size:22px;">Customer reviews</h2></div>
    <div style="max-width:640px;">
      ${productReviews.length ? productReviews.map(r=>`
        <div class="review-item">
          <span class="who">${escapeHtml(r.name)}</span><span class="when">${r.date}</span>
          <div>${starRow(r.rating)}</div>
          <p>${escapeHtml(r.comment)}</p>
        </div>`).join('') : `<p style="color:var(--ink-soft);">No reviews yet — be the first to review this product.</p>`}
      <form id="review-form" data-product="${p.id}" style="margin-top:20px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:18px;">
        <div class="field-row">
          <div><label for="rev-name">Your name</label><input id="rev-name" name="name" type="text" placeholder="Your name" value="${state.currentUser? state.currentUser.name:''}"></div>
          <div><label for="rev-rating">Rating</label>
            <select id="rev-rating" name="rating"><option value="5">5 — Excellent</option><option value="4">4 — Good</option><option value="3">3 — Average</option><option value="2">2 — Poor</option><option value="1">1 — Bad</option></select>
          </div>
        </div>
        <label for="rev-comment">Comment</label>
        <textarea id="rev-comment" name="comment" placeholder="What did you think of this product?"></textarea>
        <button type="submit" class="btn btn-dark btn-sm" style="margin-top:12px;">Submit review</button>
      </form>
    </div>

    ${related.length? `
    <div class="section-title-row"><h2 style="font-size:22px;">You may also like</h2></div>
    <div class="grid">${related.map(productCard).join('')}</div>` : ''}
  </section>`;
}

/* ======================================================================
   PAGE: CART
   ====================================================================== */
function pageCart(){
  const ids = Object.keys(state.cart);
  if(ids.length===0){
    return `<section class="wrap"><div class="empty-state">${icon('emptyCart')}<h2 style="font-size:22px;">Your basket is empty</h2><p>Nothing added yet — the aisles are stocked and waiting.</p><a href="#" data-nav="products" class="btn btn-primary">Start shopping</a></div></section>`;
  }
  const subtotal = cartSubtotal();
  const discount = couponDiscount(subtotal);
  const shipping = (subtotal - discount) >= state.settings.freeShipThreshold ? 0 : state.settings.deliveryFee;
  const total = subtotal - discount + shipping;
  const remaining = state.settings.freeShipThreshold - (subtotal - discount);

  const rows = ids.map(id=>{
    const p = findProduct(id); if(!p) return '';
    const qty = state.cart[id];
    return `
    <div class="cart-row">
      <div class="card-icon" style="color:var(--teal)">${icon(p.icon)}</div>
      <div class="cart-row-name"><h3>${p.name}</h3><div class="card-unit">${p.unit} · ${money(p.price)} each</div><button class="remove-btn" data-remove="${id}">Remove</button></div>
      <div class="stepper"><button data-dec="${id}" aria-label="Remove one">–</button><span class="qty">${qty}</span><button data-inc="${id}" aria-label="Add one more">+</button></div>
      <div class="line-total mono">${money(p.price*qty)}</div>
    </div>`;
  }).join('');

  return `
  <section class="wrap page-head"><span class="eyebrow">Your basket</span><h1>Ready when you are</h1></section>
  <section class="wrap cart-layout">
    <div class="cart-list">${rows}</div>
    <div class="receipt">
      <div class="receipt-head"><span class="mono">Order summary</span></div>
      <div class="receipt-line"><span>Subtotal</span><span>${money(subtotal)}</span></div>
      ${state.appliedCoupon ? `<div class="receipt-line"><span>Coupon ${state.appliedCoupon.code}</span><span>-${money(discount)}</span></div>` : ''}
      <div class="receipt-line"><span>Delivery</span><span>${shipping===0?'Free':money(shipping)}</span></div>
      <div class="coupon-row">
        <input type="text" id="coupon-input" placeholder="Coupon code" value="${state.appliedCoupon? state.appliedCoupon.code:''}">
        <button class="btn btn-outline btn-sm" id="apply-coupon-btn" type="button">Apply</button>
      </div>
      ${remaining>0 ? `<div class="coupon-note">Add ${money(remaining)} more for free delivery.</div>` : `<div class="coupon-note">Your delivery is free.</div>`}
      <div class="receipt-line total"><span>Total</span><span>${money(total)}</span></div>
      <a href="#" data-nav="checkout" class="btn btn-primary btn-block" style="margin-top:16px;">Proceed to checkout</a>
    </div>
  </section>`;
}

/* ======================================================================
   PAGE: CHECKOUT
   ====================================================================== */
function pageCheckout(){
  const ids = Object.keys(state.cart);
  if(ids.length===0){ navigate('cart'); return ''; }
  const subtotal = cartSubtotal();
  const discount = couponDiscount(subtotal);
  const shipping = (subtotal-discount) >= state.settings.freeShipThreshold ? 0 : state.settings.deliveryFee;
  const total = subtotal - discount + shipping;
  const miniRows = ids.map(id=>{ const p=findProduct(id); if(!p) return ''; const qty=state.cart[id]; return `<div class="receipt-line"><span>${qty} × ${p.name}</span><span>${money(p.price*qty)}</span></div>`; }).join('');
  const u = state.currentUser;

  return `
  <section class="wrap page-head"><span class="eyebrow">Checkout</span><h1>Where should it go?</h1></section>
  <section class="wrap checkout-layout">
    <form id="checkout-form" novalidate>
      <fieldset>
        <legend>Contact</legend>
        <div class="field-row">
          <div class="field" data-field="fullName"><label for="fullName">Full name</label><input id="fullName" name="fullName" type="text" placeholder="Sunita Shrestha" value="${u?u.name:''}"><div class="error-text">Enter your full name.</div></div>
          <div class="field" data-field="email"><label for="email">Email</label><input id="email" name="email" type="email" placeholder="you@example.com" value="${u?u.email:''}"><div class="error-text">Enter a valid email.</div></div>
        </div>
        <div class="field-row single">
          <div class="field" data-field="phone"><label for="phone">Phone number</label><input id="phone" name="phone" type="tel" placeholder="98XXXXXXXX"><div class="error-text">Enter a phone number.</div></div>
        </div>
      </fieldset>
      <fieldset>
        <legend>Delivery address</legend>
        <div class="field-row single"><div class="field" data-field="address"><label for="address">Street address</label><input id="address" name="address" type="text" placeholder="House 12, Jhamsikhel Road"><div class="error-text">Enter a delivery address.</div></div></div>
        <div class="field-row">
          <div class="field" data-field="city"><label for="city">City</label><input id="city" name="city" type="text" placeholder="Kathmandu"><div class="error-text">Enter a city.</div></div>
          <div class="field" data-field="zip"><label for="zip">Postal code</label><input id="zip" name="zip" type="text" placeholder="44600"><div class="error-text">Enter a postal code.</div></div>
        </div>
        <div class="field-row single">
          <div class="field" data-field="window"><label for="window">Delivery window</label>
            <select id="window" name="window">
              <option value="">Choose a time</option>
              <option>Today, 4 – 6pm</option><option>Today, 6 – 8pm</option>
              <option>Tomorrow, 8 – 10am</option><option>Tomorrow, 10am – 12pm</option>
            </select>
            <div class="error-text">Pick a delivery window.</div>
          </div>
        </div>
      </fieldset>
      <fieldset>
        <legend>Payment method</legend>
        <div class="pay-options">
          <button type="button" class="pay-opt" data-paymethod="esewa"><span class="swatch esewa">eSewa</span><span class="meta"><strong>eSewa</strong><span>Pay in NPR · demo redirect</span></span></button>
          <button type="button" class="pay-opt" data-paymethod="khalti"><span class="swatch khalti">Khalti</span><span class="meta"><strong>Khalti</strong><span>Pay in NPR · demo checkout</span></span></button>
        </div>
        <input type="hidden" id="paymentMethod" name="paymentMethod" value="">
        <div class="field" data-field="paymentMethod"><div class="error-text">Choose a payment method.</div></div>
        <p style="font-size:12px;color:var(--ink-soft);">This is a demo store — no real gateway is contacted and no money moves.</p>
      </fieldset>
      <button type="submit" class="btn btn-primary btn-block">Continue to payment · ${money(total)}</button>
    </form>
    <div class="receipt">
      <div class="receipt-head"><span class="mono">Order summary</span></div>
      ${miniRows}
      <div class="receipt-divider"></div>
      <div class="receipt-line"><span>Subtotal</span><span>${money(subtotal)}</span></div>
      ${state.appliedCoupon? `<div class="receipt-line"><span>Coupon ${state.appliedCoupon.code}</span><span>-${money(discount)}</span></div>`:''}
      <div class="receipt-line"><span>Delivery</span><span>${shipping===0?'Free':money(shipping)}</span></div>
      <div class="receipt-line total"><span>Total</span><span>${money(total)}</span></div>
    </div>
  </section>`;
}

/* ======================================================================
   PAGE: PAYMENT GATEWAY SIMULATION
   ====================================================================== */
function pagePaymentGateway(){
  const method = state.pendingPaymentMethod;
  const co = state.pendingCheckout;
  if(!co || !method){ navigate('checkout'); return ''; }
  const label = method==='esewa' ? 'eSewa' : 'Khalti';
  return `
  <section class="wrap">
    <div class="gateway-screen">
      <div class="gateway-head ${method}"><div class="mono">Demo Payment Gateway</div><h2>${label} Checkout</h2></div>
      <div class="gateway-body">
        <div class="gateway-spinner"></div>
        <p style="color:var(--ink-soft);font-size:14px;">Redirecting to ${label} to confirm your payment...</p>
        <div class="amt">${money(co.total)}</div>
        <button class="btn btn-primary btn-block" id="simulate-pay-btn">Simulate successful payment</button>
        <button class="btn btn-outline btn-block" id="simulate-cancel-btn" style="margin-top:10px;">Cancel and go back</button>

}

/* ======================================================================
   PAGE: ORDERS (history) + ORDER TRACKING
   ====================================================================== */
function visibleOrders(){
  return state.currentUser ? state.orders.filter(o=>o.customerEmail===state.currentUser.email) : state.orders.filter(o=>!o.customerEmail);
}
function pageOrders(){
  const orders = visibleOrders();
  if(orders.length===0){
    return `<section class="wrap"><div class="empty-state">${icon('emptyCart')}<h2 style="font-size:22px;">No orders yet</h2><p>${state.currentUser ? 'Orders placed while signed in show up here.' : 'Orders are saved to this browser — sign in to keep a running history tied to your account.'}</p><a href="#" data-nav="products" class="btn btn-primary">Start shopping</a></div></section>`;
  }
  const rows = orders.map(o=>{
    const d = new Date(o.placedAt);
    return `
    <div class="receipt" style="margin-bottom:22px;">
      <div class="receipt-head" style="display:flex;justify-content:space-between;align-items:baseline;text-align:left;">
        <span class="mono">Order #${o.number}</span>
        <span class="status-pill ${o.status.replace(/ /g,'-')}">${o.status}</span>
      </div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;">${d.toLocaleDateString()} · Window: ${o.window}</div>
      ${o.items.map(i=>`<div class="receipt-line"><span>${i.qty} × ${i.name}</span><span>${money(i.price*i.qty)}</span></div>`).join('')}
      <div class="receipt-line total"><span>Total</span><span>${money(o.total)}</span></div>
      <div style="text-align:right;margin-top:10px;"><a href="#" data-nav="order-track" data-navparam="${o.id}" class="btn btn-outline btn-sm">Track order</a></div>
    </div>`;
  }).join('');
  return `
  <section class="wrap page-head"><span class="eyebrow">Saved in this browser</span><h1>Your orders</h1><p>Stored locally on this device — clearing browser data will remove them.</p></section>
  <section class="wrap" style="max-width:640px;margin-top:20px;">${rows}</section>`;
}

function pageOrderTrack(orderId){
  const o = state.orders.find(o=>o.id===orderId) || visibleOrders()[0];
  if(!o){ return `<section class="wrap page-head"><h1>No orders to track</h1><a href="#" data-nav="products" class="btn btn-primary">Start shopping</a></section>`; }
  const currentIdx = ORDER_STATUS_FLOW.indexOf(o.status);
  return `
  <section class="wrap page-head"><span class="eyebrow">Order #${o.number}</span><h1>Track your order</h1></section>
  <section class="wrap" style="max-width:720px;">
    ${o.status==='Cancelled' ? `<div class="track-cancelled">This order was cancelled. Contact support if you have questions.</div>` : `
    <div class="track-stepper">
      ${ORDER_STATUS_FLOW.map((s,i)=>`
        <div class="track-step ${i<currentIdx?'done':''} ${i===currentIdx?'current':''}">
          <div class="dot">${i<currentIdx?icon('check'):icon(['box','check','box','truck','check'][i]||'box')}</div>
          <span class="label">${s}</span>
        </div>`).join('')}
    </div>`}
    <div class="receipt" style="margin-top:30px;">
      <div class="receipt-head"><span class="mono">Delivery details</span></div>
      <div class="receipt-line"><span>Delivering to</span><span>${escapeHtml(o.address)}, ${escapeHtml(o.city)}</span></div>
      <div class="receipt-line"><span>Window</span><span>${o.window}</span></div>
      <div class="receipt-line"><span>Payment</span><span>${o.paymentMethod==='esewa'?'eSewa':'Khalti'} · ${o.paymentStatus}</span></div>
      <div class="receipt-divider"></div>
      ${o.items.map(i=>`<div class="receipt-line"><span>${i.qty} × ${i.name}</span><span>${money(i.price*i.qty)}</span></div>`).join('')}
      <div class="receipt-line total"><span>Total</span><span>${money(o.total)}</span></div>
    </div>
  </section>`;
}

/* ======================================================================
   PAGE: WISHLIST
   ====================================================================== */

/* ---------- admin: generic simple CRUD table builder ---------- */
function adminEditableRow(entity, id, fields, extraCell){
  return `<tr data-editrow="${id}">
    ${fields.map(f=>`<td>${f.type==='select' ? `<select data-edit="${f.key}">${f.options.map(o=>`<option value="${o.value}" ${o.value===f.value?'selected':''}>${o.label}</option>`).join('')}</select>` : `<input type="${f.type||'text'}" ${f.step?`step="${f.step}"`:''} data-edit="${f.key}" value="${f.value}" style="${f.width?`width:${f.width}px;`:''}">`}</td>`).join('')}
    <td class="admin-actions"><button class="icon-btn save" data-save="${entity}:${id}">Save</button><button class="icon-btn delete" data-delete="${entity}:${id}">Delete</button></td>
  </tr>`;
}

/* ---------- admin: sales reports ---------- */
function pageAdminReports(){
  const totalRevenue = state.orders.reduce((s,o)=>s+o.total,0);
  const delivered = state.orders.filter(o=>o.status==='Delivered').length;
  const cancelled = state.orders.filter(o=>o.status==='Cancelled').length;
  const avgOrder = state.orders.length ? Math.round(totalRevenue/state.orders.length) : 0;
  const productTotals = {};
  state.orders.forEach(o=>o.items.forEach(i=>{ productTotals[i.name] = (productTotals[i.name]||0) + i.qty*i.price; }));
  const topProducts = Object.entries(productTotals).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxTop = Math.max(1, ...topProducts.map(t=>t[1]));
  return adminShell(`
    <div class="admin-bar"><h1 style="font-size:22px;">Sales reports</h1><span class="mono" style="font-size:12px;color:var(--ink-soft);">All-time</span></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="lbl">Total revenue</div><div class="val">${money(totalRevenue)}</div></div>
      <div class="stat-card"><div class="lbl">Orders delivered</div><div class="val">${delivered}</div></div>
      <div class="stat-card"><div class="lbl">Orders cancelled</div><div class="val">${cancelled}</div></div>
      <div class="stat-card"><div class="lbl">Average order value</div><div class="val">${money(avgOrder)}</div></div>
    </div>
    <div class="stat-card">
      <div class="lbl" style="margin-bottom:10px;">Top products by revenue</div>
      ${topProducts.length ? topProducts.map(([name,val])=>`
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span>${name}</span><span class="mono">${money(val)}</span></div>
          <div style="background:var(--bg);border-radius:5px;height:10px;overflow:hidden;"><div style="height:100%;background:var(--marigold);width:${(val/maxTop)*100}%;"></div></div>
        </div>`).join('') : `<p style="color:var(--ink-soft);font-size:13px;">No sales data yet.</p>`}
    </div>
  `);
}

        <button type="submit" class="btn btn-primary" style="margin-top:14px;">Add banner</button>
      </form>
    </div>
    ${rows || `<p style="color:var(--ink-soft);">No banners yet — the homepage will show a default message.</p>`}
  `);
}

/* ---------- admin: website settings ---------- */
function pageAdminSettings(){
  const s = state.settings;
  return adminShell(`
    <div class="admin-bar"><h1 style="font-size:22px;">Website settings</h1></div>
    <form id="settings-form" class="settings-form">
      <div class="field-row">
        <div><label>Site name</label><input name="siteName" type="text" value="${escapeHtml(s.siteName)}"></div>
        <div><label>Currency symbol</label><input name="currency" type="text" value="${escapeHtml(s.currency)}"></div>
      </div>
      <div class="field-row single"><div><label>Tagline</label><input name="tagline" type="text" value="${escapeHtml(s.tagline)}"></div></div>
      <div class="field-row">
        <div><label>Support email</label><input name="supportEmail" type="email" value="${escapeHtml(s.supportEmail)}"></div>
        <div><label>Support phone</label><input name="supportPhone" type="text" value="${escapeHtml(s.supportPhone)}"></div>
      </div>
      <div class="field-row">
        <div><label>Delivery fee (NPR)</label><input name="deliveryFee" type="number" min="0" value="${s.deliveryFee}"></div>
        <div><label>Free delivery threshold (NPR)</label><input name="freeShipThreshold" type="number" min="0" value="${s.freeShipThreshold}"></div>
      </div>
      <button type="submit" class="btn btn-primary">Save settings</button>
    </form>
  `);
}

/* ======================================================================
   VALIDATION
   ====================================================================== */
function validateForm(form, requiredNames){
  let valid = true, firstInvalid = null;
  requiredNames.forEach(name=>{
    const el = form.elements[name];
    const wrap = form.querySelector(`[data-field="${name}"]`);
    if(!el || !wrap) return;
    let ok = el.value && el.value.trim().length>0;
    if(name==='email' && ok){ ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value.trim()); }
    wrap.classList.toggle('field-error', !ok);
    if(!ok){ valid=false; if(!firstInvalid) firstInvalid = el; }
  });
  if(firstInvalid) firstInvalid.focus();
  return valid;
}

/* ======================================================================
   RENDER
   ====================================================================== */
const CUSTOMER_ROUTES = {
  home:pageHome, products:pageProducts, categories:pageCategories, search:pageSearch,
  cart:pageCart, checkout:pageCheckout, 'payment-gateway':pagePaymentGateway,
  'order-success':pageOrderSuccess, orders:pageOrders,
  wishlist:pageWishlist, account:pageAccount, contact:pageContact, about:pageAbout, faq:pageFaq
};
const ADMIN_ROUTES = {
  'admin-dashboard':pageAdminDashboard, 'admin-categories':pageAdminCategories, 'admin-products':pageAdminProducts,
  'admin-orders':pageAdminOrders, 'admin-customers':pageAdminCustomers, 'admin-payments':pageAdminPayments,
  'admin-reviews':pageAdminReviews, 'admin-coupons':pageAdminCoupons, 'admin-reports':pageAdminReports,
  'admin-banners':pageAdminBanners, 'admin-settings':pageAdminSettings
};

function render(){
  const app = document.getElementById('app');
  let html;
  if(state.route === 'admin-login'){
    html = pageAdminLogin();
  } else if(ADMIN_ROUTES[state.route]){
    if(!state.isAdmin){ state.route = 'admin-login'; html = pageAdminLogin(); }
    else html = ADMIN_ROUTES[state.route]();
  } else if(state.route === 'product'){
    html = `${headerHTML()}<main>${pageProductDetails(state.routeParam)}</main>${footerHTML()}`;
  } else if(state.route === 'order-track'){
    html = `${headerHTML()}<main>${pageOrderTrack(state.routeParam)}</main>${footerHTML()}`;
  } else if(CUSTOMER_ROUTES[state.route]){
    html = `${headerHTML()}<main>${CUSTOMER_ROUTES[state.route]()}</main>${footerHTML()}`;
  } else {
    html = `${headerHTML()}<main>${pageHome()}</main>${footerHTML()}`;
  }
  app.innerHTML = html;
  if(state.toast){ const t=document.createElement('div'); t.className='save-toast'; t.textContent=state.toast; document.body.appendChild(t); }
  attachEvents();
}

/* ======================================================================
   EVENTS
   ====================================================================== */
function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.preventDefault();
      const param = el.getAttribute('data-navparam') || null;
      navigate(el.getAttribute('data-nav'), param);
    });
  });
  document.querySelectorAll('[data-catnav]').forEach(el=>{
    el.addEventListener('click', e=>{ e.preventDefault(); state.filter = el.getAttribute('data-catnav'); navigate('products'); });
  });
  document.querySelectorAll('[data-filter]').forEach(el=>{
    el.addEventListener('click', e=>{ e.preventDefault(); state.filter = el.getAttribute('data-filter'); render(); });
  });
  document.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', ()=> navigate('product', el.getAttribute('data-open')));
  });
  document.querySelectorAll('[data-add]').forEach(el=>{
    el.addEventListener('click', ()=> addToCart(el.getAttribute('data-add')));
  });
  document.querySelectorAll('[data-inc]').forEach(el=>{
    el.addEventListener('click', ()=>{ const id=el.getAttribute('data-inc'); setQty(id,(state.cart[id]||0)+1); });
  });
  document.querySelectorAll('[data-inc-safe]').forEach(el=>{
    el.addEventListener('click', ()=>{ const id=el.getAttribute('data-inc-safe'); setQty(id,(state.cart[id]||1)+1); });
  });
  document.querySelectorAll('[data-dec]').forEach(el=>{
    el.addEventListener('click', ()=>{ const id=el.getAttribute('data-dec'); setQty(id,(state.cart[id]||0)-1); });
  });
  document.querySelectorAll('[data-remove]').forEach(el=>{
    el.addEventListener('click', ()=> setQty(el.getAttribute('data-remove'), 0));
  });
  document.querySelectorAll('[data-wish]').forEach(el=>{
    el.addEventListener('click', ()=> toggleWishlist(el.getAttribute('data-wish')));
  });
  document.querySelectorAll('[data-hero]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.heroSlide = parseInt(el.getAttribute('data-hero'),10); render(); });
  });

  const headerSearch = document.getElementById('header-search-form');
  if(headerSearch){
    headerSearch.addEventListener('submit', e=>{
      e.preventDefault();
      state.searchQuery = new FormData(headerSearch).get('q') || '';
      navigate('search');
    });
  }

  const applyCouponBtn = document.getElementById('apply-coupon-btn');
  if(applyCouponBtn){
    applyCouponBtn.addEventListener('click', ()=>{
      const input = document.getElementById('coupon-input');
      const code = (input.value||'').trim().toUpperCase();
      const c = state.coupons.find(c=>c.code===code && c.active);
      if(!c){ showToast('Invalid or inactive coupon code.'); state.appliedCoupon=null; render(); return; }
      if(new Date(c.expiry) < new Date()){ showToast('This coupon has expired.'); state.appliedCoupon=null; render(); return; }
      if(cartSubtotal() < c.minOrder){ showToast(`Minimum order for this coupon is ${money(c.minOrder)}.`); state.appliedCoupon=null; render(); return; }
      state.appliedCoupon = c;
      showToast(`Coupon ${c.code} applied.`);
      render();
    });
  }

  /* ---- checkout ---- */
  document.querySelectorAll('[data-paymethod]').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.querySelectorAll('.pay-opt').forEach(p=>p.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('paymentMethod').value = el.getAttribute('data-paymethod');
    });
  });
  const checkoutForm = document.getElementById('checkout-form');
  if(checkoutForm){
    checkoutForm.addEventListener('submit', e=>{
      e.preventDefault();
      const required = ['fullName','email','phone','address','city','zip','window'];
      let valid = validateForm(checkoutForm, required);
      const method = checkoutForm.elements['paymentMethod'].value;
      const methodWrap = checkoutForm.querySelector('[data-field="paymentMethod"]');
      if(!method){ methodWrap.classList.add('field-error'); valid=false; } else { methodWrap.classList.remove('field-error'); }
      if(!valid) return;
      const data = Object.fromEntries(new FormData(checkoutForm).entries());
      const subtotal = cartSubtotal();
      const discount = couponDiscount(subtotal);
      const shipping = (subtotal-discount) >= state.settings.freeShipThreshold ? 0 : state.settings.deliveryFee;
      const total = subtotal - discount + shipping;
      state.pendingCheckout = { ...data, subtotal, discount, shipping, total };
      state.pendingPaymentMethod = method;
      navigate('payment-gateway');
    });
  }

  /* ---- payment gateway simulation ---- */
  const payBtn = document.getElementById('simulate-pay-btn');
  if(payBtn){
    payBtn.addEventListener('click', ()=>{
      const co = state.pendingCheckout, method = state.pendingPaymentMethod;
      const orderItems = Object.entries(state.cart).map(([id,qty])=>{ const p=findProduct(id); return {id, name:p.name, qty, price:p.price}; });
      const order = {
        id:'o'+Date.now(), number:orderNumber(),
        name:co.fullName, email:co.email, phone:co.phone,
        customerEmail: state.currentUser ? state.currentUser.email : null,
        address:co.address, city:co.city, zip:co.zip, window:co.window,
        paymentMethod:method, paymentStatus:'Paid', transactionId:txnId(method==='esewa'?'ESW':'KHL'),
        status:'Pending', placedAt:new Date().toISOString(),
        items:orderItems, subtotal:co.subtotal, discount:co.discount, shipping:co.shipping, total:co.total,
        couponCode: state.appliedCoupon ? state.appliedCoupon.code : null
      };
      state.orders.unshift(order);
      save(KEYS.orders, state.orders);
      state.lastOrderId = order.id;
      state.cart = {}; save(KEYS.cart, state.cart);
      state.appliedCoupon = null; state.pendingCheckout=null; state.pendingPaymentMethod=null;
      navigate('order-success');
    });
  }
  const cancelPayBtn = document.getElementById('simulate-cancel-btn');
  if(cancelPayBtn){ cancelPayBtn.addEventListener('click', ()=> navigate('checkout')); }

  /* ---- product review form ---- */
  const reviewForm = document.getElementById('review-form');
  if(reviewForm){
    reviewForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(reviewForm).entries());
      if(!data.name || !data.comment){ showToast('Please add your name and a comment.'); return; }
      const productId = reviewForm.getAttribute('data-product');
      const newReview = { id:'rev'+Date.now(), productId, name:data.name, rating:parseInt(data.rating,10), comment:data.comment, date:new Date().toISOString().slice(0,10) };
      state.reviews.unshift(newReview); save(KEYS.reviews, state.reviews);
      const p = findProduct(productId);
      if(p){ const list = state.reviews.filter(r=>r.productId===p.id); p.reviews = list.length; p.rating = list.reduce((s,r)=>s+r.rating,0)/list.length; save(KEYS.products, state.products); }
      showToast('Review submitted — thank you!');
      render();
    });
  }

  /* ---- contact form ---- */
  const contactForm = document.getElementById('contact-form');
  if(contactForm){
    contactForm.addEventListener('submit', e=>{ e.preventDefault(); showToast('Message sent — our team will reply by email.'); contactForm.reset(); });
  }

  /* ---- FAQ accordion ---- */
  document.querySelectorAll('.faq-item .faq-q').forEach(btn=>{
    btn.addEventListener('click', ()=>{ btn.closest('.faq-item').classList.toggle('open'); });
  });

  /* ---- customer auth ---- */
  document.querySelectorAll('[data-authmode]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.authMode = el.getAttribute('data-authmode'); state.authError=''; render(); });
  });
  const authForm = document.getElementById('auth-form');
  if(authForm){
    authForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(authForm).entries());
      const email = (data.email||'').trim().toLowerCase();
      const password = data.password||'';
      if(state.authMode==='signup'){
        const name = (data.name||'').trim();
        if(!name||!email||!password){ state.authError='Fill in every field to create an account.'; render(); return; }
        if(state.users.some(u=>u.email===email)){ state.authError='An account with that email already exists.'; render(); return; }
        const newUser = { name, email, password, phone:'', address:'', city:'', zip:'' };
        state.users.push(newUser); save(KEYS.users, state.users);
        state.currentUser = { name, email }; save(KEYS.session, state.currentUser);
        state.authError=''; navigate('account');
      } else {
        const match = state.users.find(u=>u.email===email && u.password===password);
        if(!match){ state.authError='Email or password is incorrect.'; render(); return; }
        state.currentUser = { ...match }; delete state.currentUser.password;
        save(KEYS.session, state.currentUser);
        state.authError=''; navigate('account');
      }
    });
  }
  const logoutBtn = document.getElementById('logout-btn');
  if(logoutBtn){ logoutBtn.addEventListener('click', ()=>{ state.currentUser=null; save(KEYS.session,null); navigate('home'); }); }

  document.querySelectorAll('[data-profiletab]').forEach(el=>{
    el.addEventListener('click', ()=> navigate('account', el.getAttribute('data-profiletab')));
  });
  const profileDetailsForm = document.getElementById('profile-details-form');
  if(profileDetailsForm){
    profileDetailsForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(profileDetailsForm).entries());
      state.currentUser.name = data.name; state.currentUser.phone = data.phone;
      const u = state.users.find(u=>u.email===state.currentUser.email);
      if(u){ u.name=data.name; u.phone=data.phone; save(KEYS.users, state.users); }
      save(KEYS.session, state.currentUser);
      showToast('Details saved.'); render();
    });
  }
  const profileAddressForm = document.getElementById('profile-address-form');
  if(profileAddressForm){
    profileAddressForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(profileAddressForm).entries());
      Object.assign(state.currentUser, data);
      const u = state.users.find(u=>u.email===state.currentUser.email);
      if(u) Object.assign(u, data);
      save(KEYS.users, state.users); save(KEYS.session, state.currentUser);
      showToast('Address saved.'); render();
    });
  }

  /* ---- admin login/logout ---- */
  const adminLoginForm = document.getElementById('admin-login-form');
  if(adminLoginForm){
    adminLoginForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(adminLoginForm).entries());
      if(data.email===ADMIN_CREDENTIALS.email && data.password===ADMIN_CREDENTIALS.password){
        state.isAdmin=true; save(KEYS.adminSession, true); state.adminError=''; navigate('admin-dashboard');
      } else { state.adminError='Incorrect admin email or password.'; render(); }
    });
  }
  const adminLogoutBtn = document.getElementById('admin-logout-btn');
  if(adminLogoutBtn){ adminLogoutBtn.addEventListener('click', ()=>{ state.isAdmin=false; save(KEYS.adminSession,false); navigate('home'); }); }

  /* ---- admin generic edit-row triggers ---- */
  document.querySelectorAll('[data-edit-row]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const [entity,id] = el.getAttribute('data-edit-row').split(':');
      state.editingEntity = entity; state.editingId = id; render();
    });
  });
  document.querySelectorAll('[data-save]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const [entity,id] = el.getAttribute('data-save').split(':');
      const row = document.querySelector(`[data-editrow="${id}"]`);
      if(!row) return;
      if(entity==='categories'){
        const c = CATEGORIES.find(c=>c.id===id);
        if(c) c.name = row.querySelector('[data-edit="name"]').value;
      } else if(entity==='products'){
        const p = findProduct(id);
        if(p){
          p.name = row.querySelector('[data-edit="name"]').value;
          p.cat = row.querySelector('[data-edit="cat"]').value;
          p.unit = row.querySelector('[data-edit="unit"]').value;
          p.price = parseFloat(row.querySelector('[data-edit="price"]').value) || p.price;
          p.stock = parseInt(row.querySelector('[data-edit="stock"]').value,10) || 0;
          p.tag = row.querySelector('[data-edit="tag"]').value;
          save(KEYS.products, state.products);
        }
      } else if(entity==='coupons'){
        const c = state.coupons.find(c=>c.code===id);
        if(c){
          c.code = row.querySelector('[data-edit="code"]').value.toUpperCase();
          c.type = row.querySelector('[data-edit="type"]').value;
          c.value = parseFloat(row.querySelector('[data-edit="value"]').value)||0;
          c.minOrder = parseFloat(row.querySelector('[data-edit="minOrder"]').value)||0;
          c.expiry = row.querySelector('[data-edit="expiry"]').value;
          save(KEYS.coupons, state.coupons);
        }
      }
      state.editingEntity=null; state.editingId=null;
      showToast('Saved.'); render();
    });
  });
  document.querySelectorAll('[data-delete]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const [entity,id] = el.getAttribute('data-delete').split(':');
      if(!confirm('Remove this item?')) return;
      if(entity==='products'){ state.products = state.products.filter(p=>p.id!==id); save(KEYS.products, state.products); }
      else if(entity==='orders'){ state.orders = state.orders.filter(o=>o.id!==id); save(KEYS.orders, state.orders); }
      else if(entity==='users'){ state.users = state.users.filter(u=>u.email!==id); save(KEYS.users, state.users); }
      else if(entity==='reviews'){ state.reviews = state.reviews.filter(r=>r.id!==id); save(KEYS.reviews, state.reviews); }
      else if(entity==='coupons'){ state.coupons = state.coupons.filter(c=>c.code!==id); save(KEYS.coupons, state.coupons); }
      else if(entity==='banners'){ state.banners = state.banners.filter(b=>b.id!==id); save(KEYS.banners, state.banners); }
      render();
    });
  });
  document.querySelectorAll('[data-togglecoupon]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const c = state.coupons.find(c=>c.code===el.getAttribute('data-togglecoupon'));
      if(c){ c.active = !c.active; save(KEYS.coupons, state.coupons); render(); }
    });
  });
  document.querySelectorAll('[data-orderstatus]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const o = state.orders.find(o=>o.id===el.getAttribute('data-orderstatus'));
      if(o){ o.status = el.value; save(KEYS.orders, state.orders); showToast(`Order #${o.number} marked ${o.status}.`); render(); }
    });
  });

  /* ---- admin add forms ---- */
  const addProductForm = document.getElementById('add-product-form');
  if(addProductForm){
    addProductForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(addProductForm).entries());
      const price = parseFloat(data.price), stock = parseInt(data.stock,10);
      if(!data.name||!data.unit||!data.tag||isNaN(price)||price<0||isNaN(stock)) return;
      state.products.push({ id:'p'+Date.now(), name:data.name, unit:data.unit, price, mrp:price, cat:data.cat, icon:data.icon, tag:data.tag, stock, rating:4.0, reviews:0 });
      save(KEYS.products, state.products);
      addProductForm.reset(); showToast('Product added.'); render();
    });
  }
  const addCouponForm = document.getElementById('add-coupon-form');
  if(addCouponForm){
    addCouponForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(addCouponForm).entries());
      const code = (data.code||'').trim().toUpperCase();
      if(!code || state.coupons.some(c=>c.code===code)){ showToast('Enter a unique coupon code.'); return; }
      state.coupons.push({ code, type:data.type, value:parseFloat(data.value)||0, minOrder:parseFloat(data.minOrder)||0, active:true, expiry:data.expiry });
      save(KEYS.coupons, state.coupons);
      addCouponForm.reset(); showToast('Coupon added.'); render();
    });
  }
  const addBannerForm = document.getElementById('add-banner-form');
  if(addBannerForm){
    addBannerForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(addBannerForm).entries());
      if(!data.title||!data.subtitle) return;
      state.banners.push({ id:'b'+Date.now(), title:data.title, subtitle:data.subtitle, theme:data.theme });
      save(KEYS.banners, state.banners);
      addBannerForm.reset(); showToast('Banner added.'); render();
    });
  }
  const settingsForm = document.getElementById('settings-form');
  if(settingsForm){
    settingsForm.addEventListener('submit', e=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(settingsForm).entries());
      state.settings = {
        ...state.settings, siteName:data.siteName, currency:data.currency, tagline:data.tagline,
        supportEmail:data.supportEmail, supportPhone:data.supportPhone,
        deliveryFee:parseFloat(data.deliveryFee)||0, freeShipThreshold:parseFloat(data.freeShipThreshold)||0
      };
      save(KEYS.settings, state.settings);
      showToast('Settings saved.'); render();
    });
  }
}

render();

</script>
